model_list:

  ######################################################################
  # PREMIUM MODELS
  # Akurasi & reasoning terbaik
  ######################################################################

  # OPENAI GPT-4.1
  - model_name: premium-gpt41
    litellm_params:
      model: openai/gpt-4.1
      api_key: os.environ/OPENAI_API_KEY

  # OPENAI GPT-4o
  - model_name: premium-gpt4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  ######################################################################
  # CHEAP & GOOD MODELS
  # Bagus untuk coding harian dan lebih murah
  ######################################################################

  # OPENROUTER DEEPSEEK FREE
  - model_name: cheap-deepseek-free
    litellm_params:
      model: openrouter/deepseek/deepseek-chat:free
      api_key: os.environ/OPENROUTER_API_KEY

  # OPENROUTER QWEN CODER
  - model_name: cheap-qwen-coder
    litellm_params:
      model: openrouter/qwen/qwen-2.5-coder-32b-instruct
      api_key: os.environ/OPENROUTER_API_KEY

  # OPENROUTER LLAMA
  - model_name: cheap-llama
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY

  ######################################################################
  # SUMOPOD PRIVATE MODELS
  # Source code tetap lewat provider internal kamu
  ######################################################################

  # SUMOPOD QWEN CODER
  - model_name: private-qwen-coder
    litellm_params:
      model: openai/Qwen/Qwen3-Coder
      api_base: https://ai.sumopod.com/v1
      api_key: os.environ/SUMOPOD_API_KEY

  # SUMOPOD DEEPSEEK
  - model_name: private-deepseek
    litellm_params:
      model: openai/DeepSeek-R1
      api_base: https://ai.sumopod.com/v1
      api_key: os.environ/SUMOPOD_API_KEY

  ######################################################################
  # OLLAMA LOCAL MODELS
  # Tidak keluar server, full lokal
  ######################################################################

  # OLLAMA QWEN CODER 7B
  - model_name: local-qwen-coder
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://host.docker.internal:11434

  # OLLAMA PHI3 MINI
  - model_name: local-phi3-mini
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://host.docker.internal:11434

  ######################################################################
  # FAST MODELS
  # Cepat & murah untuk task kecil
  ######################################################################

  # OPENROUTER MISTRAL
  - model_name: fast-mistral
    litellm_params:
      model: openrouter/mistralai/mistral-7b-instruct
      api_key: os.environ/OPENROUTER_API_KEY

  # OPENROUTER GEMMA
  - model_name: fast-gemma
    litellm_params:
      model: openrouter/google/gemma-3-27b-it
      api_key: os.environ/OPENROUTER_API_KEY